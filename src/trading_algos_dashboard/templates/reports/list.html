{% extends "base.html" %}
{% block content %}
<h1>Saved reports</h1>
<ul class="list-group">
  {% for report in reports %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <span><strong>{{ report.report.algorithm_summary.algorithm_name if report.report else (report.alg_name or report.config_name) }}</strong> — {{ report.experiment_id }}</span>
    <a href="{{ url_for('reports.report_detail', experiment_id=report.experiment_id) }}">Open</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
