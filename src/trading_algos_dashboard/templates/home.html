{% extends "base.html" %}
{% block content %}
<div class="p-4 bg-light rounded-3">
  <h1 class="display-6">Trading algorithm development dashboard</h1>
  <p class="lead">Browse alert algorithms, run experiments on smarttrade data, compare outputs, and revisit saved reports.</p>
  <div class="d-flex gap-2 flex-wrap">
    <a class="btn btn-primary" href="{{ url_for('algorithms.list_algorithms') }}">Browse algorithms</a>
    <a class="btn btn-success" href="{{ url_for('experiments.new_experiment') }}">Run experiment</a>
    <a class="btn btn-outline-secondary" href="{{ url_for('experiments.history') }}">View history</a>
    <a class="btn btn-outline-secondary" href="{{ url_for('administration.experiment_runtime_settings') }}">Open runtime settings</a>
  </div>
</div>
{% endblock %}
