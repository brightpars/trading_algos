<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Algos Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home.home') }}">Trading Dashboard</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('algorithms.list_algorithms') }}">Algorithms</a>
          <a class="nav-link" href="{{ url_for('configurations.list_configurations') }}">Configurations</a>
          <a class="nav-link" href="{{ url_for('experiments.new_experiment') }}">Run</a>
          <a class="nav-link" href="{{ url_for('experiments.history') }}">Experiments</a>
          <a class="nav-link" href="{{ url_for('reports.list_reports') }}">Reports</a>
        </div>
      </div>
    </nav>
    <main class="container pb-5">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-4">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/experiment_form.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
  </body>
  </html>
