{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Configuration drafts</h1>
  <a class="btn btn-primary" href="{{ url_for('configurations.new_configuration') }}">New draft</a>
</div>
<table class="table table-striped">
  <thead><tr><th>Draft ID</th><th>Config key</th><th>Name</th><th>Status</th><th>Updated</th><th></th></tr></thead>
  <tbody>
    {% for draft in drafts %}
    <tr>
      <td><code>{{ draft.draft_id }}</code></td>
      <td>{{ draft.config_key }}</td>
      <td>{{ draft.name }}</td>
      <td>{{ draft.status }}</td>
      <td>{{ draft.updated_at }}</td>
      <td>
        <div class="d-flex gap-3 align-items-center">
          <a href="{{ url_for('configurations.detail_configuration', draft_id=draft.draft_id) }}">Open</a>
          <form method="post" action="{{ url_for('configurations.delete_configuration', draft_id=draft.draft_id) }}" onsubmit="return confirm('Delete this configuration draft?');" class="d-inline">
            <button class="btn btn-link p-0 align-baseline text-danger" type="submit">Delete</button>
          </form>
        </div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
