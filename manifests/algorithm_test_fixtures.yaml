fixtures_version: 1
fixtures:
- fixture_id: fixture.trend_monotonic_cross_v1
  domain: single_asset_ohlcv
  purpose: Clean moving-average crossover with one bullish transition.
  inputs:
    dataset_path: tests/fixtures/trend/monotonic_cross.csv
  expected_behaviors:
  - Fast moving average crosses slow moving average exactly once
  - Buy event occurs on the first positive crossover
  - No sell event appears later in the fixture horizon
  - Short-history evaluation remains neutral until warmup is satisfied
  - Normalized outputs include trend score, regime label, spread, confirmation state, warmup readiness, and reason codes for dashboard explanation
  - Registration metadata and catalog references remain aligned with the manifest row and dashboard payloads
- fixture_id: fixture.trend_whipsaw_guard_v1
  domain: single_asset_ohlcv
  purpose: Sideways price action used to validate anti-whipsaw filters.
  inputs:
    dataset_path: tests/fixtures/trend/whipsaw_guard.csv
  expected_behaviors:
  - Trend algorithms produce fewer events when a minimum-spread or confirmation filter is enabled
  - No lookahead is required to suppress noisy crossover churn
  - Guarded variants can stay neutral when alignment is insufficient to justify a trade
  - Diagnostics expose confirmation state, pending-versus-confirmed reason codes, and alignment context for churn explanation
- fixture_id: fixture.momentum_sustained_up_v1
  domain: single_asset_ohlcv
  purpose: Sustained price continuation for single-asset momentum checks.
  inputs:
    dataset_path: tests/fixtures/momentum/sustained_up.csv
  expected_behaviors:
  - Momentum score rises above bullish threshold
  - No bearish reversal occurs while continuation remains intact
  - Short-history evaluation remains neutral until each algorithm warmup is satisfied
  - KST signal-cross configurations may remain neutral when the oscillator stays positive but does not clear its signal line, while zero-cross mode can still promote a bullish regime
  - Volume-confirmed momentum stays neutral with explicit confirmation-missing reason codes when price momentum is strong but relative volume stays below the configured gate
  - Diagnostics expose primary value, threshold context, regime label, and reason codes for dashboard explanation
  - Normalized output metadata identifies momentum family, bar-series reporting mode, and catalog reference for child-algorithm composition
- fixture_id: fixture.momentum_cross_sectional_ranking_v1
  domain: multi_asset_panel
  purpose: Deterministic ranking of a small universe on rebalance dates.
  inputs:
    dataset_path: tests/fixtures/momentum/cross_sectional_ranking.csv
  expected_behaviors:
  - Known winners rank above known losers on the target rebalance date
  - Selection list is reproducible under the declared ranking rule
- fixture_id: fixture.mean_reversion_one_overshoot_v1
  domain: single_asset_ohlcv
  purpose: One clean overshoot and re-entry toward mean.
  inputs:
    dataset_path: tests/fixtures/mean_reversion/one_overshoot.csv
  expected_behaviors:
  - Stretch metric reaches entry threshold once
  - Strategy exits when price or indicator reverts toward mean
  - Short-history evaluation remains neutral until each algorithm warmup is satisfied
  - Overshoot-aware mean-reversion algorithms can emit at least one bullish reversion signal on the downside stretch
  - Diagnostics expose primary value, signal value, threshold context, exit value, confirmation state, and reason codes for dashboard explanation
  - Normalized output metadata identifies mean_reversion family, bar-series reporting mode, and catalog reference for child-algorithm composition
- fixture_id: fixture.mean_reversion_range_oscillation_v1
  domain: single_asset_ohlcv
  purpose: Range-bound oscillation used to validate repeated mean-reversion behavior.
  inputs:
    dataset_path: tests/fixtures/mean_reversion/range_oscillation.csv
  expected_behaviors:
  - Range-aware reversion strategies can trigger multiple valid entries
  - Trend filters, when enabled, keep the strategy active in range mode
- fixture_id: fixture.volatility_compression_release_v1
  domain: single_asset_ohlcv
  purpose: Compression followed by strong expansion for volatility breakout tests.
  inputs:
    dataset_path: tests/fixtures/volatility/compression_release.csv
  expected_behaviors:
  - Compression flag turns on before breakout
  - Breakout signal appears only after expansion begins
  - ATR-channel breakout stays neutral during compression and promotes a bullish breakout only after price clears the dynamic upper band
  - Volatility mean reversion emits a sell or short-vol style signal only after realized volatility rises materially above its rolling baseline
  - Short-history evaluation remains neutral until each algorithm warmup is satisfied
  - Diagnostics expose compression state, breakout level or ATR bands, realized-volatility ratio context, confirmation state, warmup readiness, and reason codes for dashboard explanation
  - Normalized output metadata identifies volatility_options family, bar-series reporting mode, and catalog reference for child-algorithm composition
- fixture_id: fixture.pattern_support_rejection_v1
  domain: single_asset_ohlcv
  purpose: Support touch followed by clear rejection.
  inputs:
    dataset_path: tests/fixtures/patterns/support_rejection.csv
  expected_behaviors:
  - Support touch is detected inside configured buffer
  - Buy signal requires rejection confirmation, not just a touch
  - Short-history evaluation remains neutral until each algorithm warmup is satisfied
  - Support-bounce diagnostics expose support level, touch distance, rejection strength, warmup readiness, and reason codes for dashboard explanation
  - Breakout-retest stays neutral with awaiting-breakout diagnostics when the fixture does not contain a qualifying breakout-retest sequence
  - Pivot and inside-bar variants can remain neutral while still exposing nearest-level or mother-bar diagnostics needed to explain why no trade was taken
  - Normalized output metadata identifies pattern_price_action family, bar-series reporting mode, and catalog reference for child-algorithm composition
- fixture_id: fixture.pattern_opening_range_breakout_v1
  domain: intraday_ohlcv
  purpose: Opening range with one clean breakout direction.
  inputs:
    dataset_path: tests/fixtures/patterns/opening_range_breakout.csv
  expected_behaviors:
  - Opening range is frozen after configured window
  - Breakout signal occurs only after range is fully defined
  - Short-history evaluation remains neutral until the opening-range warmup is satisfied
  - Diagnostics expose opening-range high and low, session label, session minute, range-complete state, breakout distance, warmup readiness, and reason codes for dashboard explanation
  - Normalized output metadata identifies pattern_price_action family, bar-series reporting mode, and catalog reference for child-algorithm composition
